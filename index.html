<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Luna - Your AI Girlfriend</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 70%, #f06292 100%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Floating hearts background */
  .hearts-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .heart-float {
    position: absolute; font-size: 20px; opacity: 0.15;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0.15; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  .app-container {
    position: relative; z-index: 1;
    width: 420px; height: 700px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    box-shadow: 0 25px 60px rgba(233,30,99,0.25), 0 0 0 1px rgba(255,255,255,0.5) inset;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #ec407a, #d81b60);
    padding: 20px 24px 16px;
    display: flex; align-items: center; gap: 14px; flex-shrink: 0;
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, #fce4ec, #f48fb1);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    flex-shrink: 0; position: relative;
  }
  .avatar .status-dot {
    position: absolute; bottom: 2px; right: 2px;
    width: 12px; height: 12px; background: #69f0ae;
    border: 2px solid white; border-radius: 50%;
  }
  .header-info { flex: 1; min-width: 0; }
  .header-info h2 { color: white; font-size: 18px; font-weight: 700; }
  .header-info .status-text {
    color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 2px;
  }
  .header-actions { display: flex; gap: 6px; }
  .header-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.2); color: white; font-size: 18px;
    cursor: pointer; transition: 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .header-btn:hover { background: rgba(255,255,255,0.35); }

  /* Mood bar */
  .mood-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 24px;
    background: rgba(236,64,122,0.08);
    border-bottom: 1px solid rgba(233,30,99,0.08);
    flex-shrink: 0;
  }
  .mood-label { font-size: 12px; color: #ad1457; font-weight: 600; }
  .mood-meter { flex: 1; height: 4px; background: rgba(233,30,99,0.12); border-radius: 4px; overflow: hidden; }
  .mood-fill {
    height: 100%;
    background: linear-gradient(90deg, #f06292, #ec407a, #d81b60);
    border-radius: 4px; transition: width 0.5s ease; width: 70%;
  }
  .mood-emoji { font-size: 16px; }

  /* Chat messages */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(233,30,99,0.2); border-radius: 4px; }
  .message { max-width: 80%; animation: msgIn 0.35s ease; display: flex; flex-direction: column; }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.bot { align-self: flex-start; }
  .bubble {
    padding: 12px 18px; border-radius: 20px; font-size: 15px;
    line-height: 1.5; word-break: break-word; position: relative;
  }
  .message.user .bubble {
    background: linear-gradient(135deg, #ec407a, #d81b60); color: white;
    border-bottom-right-radius: 4px; box-shadow: 0 2px 8px rgba(233,30,99,0.2);
  }
  .message.bot .bubble {
    background: white; color: #3e2723; border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid rgba(233,30,99,0.08);
  }
  .message .time { font-size: 11px; color: #999; margin-top: 4px; padding: 0 6px; }

  /* Badge for LLM mode */
  .llm-badge {
    font-size: 10px; background: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9); padding: 2px 8px;
    border-radius: 10px; margin-left: 6px; font-weight: 600;
  }

  /* Typing indicator */
  .typing-indicator {
    align-self: flex-start; display: none; align-items: center; gap: 10px; padding: 6px 0;
  }
  .typing-indicator.active { display: flex; }
  .typing-indicator .bubble {
    background: white; padding: 14px 20px; border-radius: 20px;
    border-bottom-left-radius: 4px; border: 1px solid rgba(233,30,99,0.08);
    display: flex; gap: 4px;
  }
  .typing-indicator .bubble span {
    width: 8px; height: 8px; background: #ec407a; border-radius: 50%;
    display: inline-block; animation: typingDot 1.4s infinite ease-in-out;
  }
  .typing-indicator .bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }
  .typing-indicator .typing-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #fce4ec, #f48fb1);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  /* Input area */
  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid rgba(233,30,99,0.08);
    flex-shrink: 0; background: rgba(255,255,255,0.5);
  }
  .input-row { display: flex; align-items: flex-end; gap: 10px; }
  .input-wrapper {
    flex: 1; background: white; border-radius: 24px;
    border: 2px solid rgba(233,30,99,0.12);
    display: flex; align-items: flex-end; transition: 0.2s;
    padding: 4px 4px 4px 18px;
  }
  .input-wrapper:focus-within {
    border-color: #ec407a; box-shadow: 0 0 0 4px rgba(236,64,122,0.1);
  }
  .input-wrapper textarea {
    flex: 1; border: none; outline: none;
    font-family: 'Nunito', sans-serif; font-size: 15px; padding: 8px 0;
    resize: none; max-height: 100px; line-height: 1.4;
    background: transparent; color: #3e2723;
  }
  .input-wrapper textarea::placeholder { color: #bbb; }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #ec407a, #d81b60); color: white;
    font-size: 20px; cursor: pointer; transition: 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; opacity: 0.6; pointer-events: none;
  }
  .send-btn.active { opacity: 1; pointer-events: auto; }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 15px rgba(233,30,99,0.35); }
  .send-btn:active { transform: scale(0.95); }

  /* Suggestions */
  .suggestions {
    display: flex; gap: 8px; padding: 12px 20px 0; flex-wrap: wrap; flex-shrink: 0;
  }
  .suggestion-chip {
    padding: 6px 14px; border-radius: 16px;
    border: 1px solid rgba(233,30,99,0.2);
    background: rgba(255,255,255,0.7); color: #ad1457;
    font-size: 13px; cursor: pointer; transition: 0.2s;
    font-family: 'Nunito', sans-serif; font-weight: 600;
  }
  .suggestion-chip:hover { background: #ec407a; color: white; border-color: #ec407a; }

  .welcome-message {
    text-align: center; padding: 20px 0 10px;
    color: #ad1457; font-size: 14px; animation: fadeInUp 0.6s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Settings modal */
  .modal-overlay {
    display: none; position: absolute; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center;
    border-radius: 32px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white; border-radius: 24px; padding: 28px;
    width: 360px; max-width: 90%; max-height: 80%; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal h3 {
    font-size: 20px; color: #d81b60; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .modal label {
    display: block; font-size: 13px; font-weight: 700; color: #555; margin: 14px 0 4px;
  }
  .modal input, .modal select {
    width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0;
    border-radius: 12px; font-size: 14px; font-family: 'Nunito', sans-serif;
    transition: 0.2s; outline: none; background: #fafafa;
  }
  .modal input:focus, .modal select:focus {
    border-color: #ec407a; box-shadow: 0 0 0 3px rgba(236,64,122,0.1); background: white;
  }
  .modal .hint {
    font-size: 12px; color: #999; margin-top: 4px; line-height: 1.4;
  }
  .modal .hint a { color: #ec407a; }
  .modal .hint.success { color: #43a047; }
  .modal .btn-row {
    display: flex; gap: 10px; margin-top: 20px;
  }
  .modal .btn-row button {
    flex: 1; padding: 10px; border-radius: 12px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: 0.2s;
  }
  .modal .btn-save {
    background: linear-gradient(135deg, #ec407a, #d81b60); color: white;
  }
  .modal .btn-save:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(233,30,99,0.3); }
  .modal .btn-cancel { background: #f5f5f5; color: #666; }
  .modal .btn-cancel:hover { background: #eee; }
  .modal .model-status {
    padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-top: 8px;
  }
  .modal .model-status.connected { background: #e8f5e9; color: #2e7d32; }
  .modal .model-status.disconnected { background: #fce4ec; color: #c62828; }

  @media (max-width: 480px) {
    .app-container { width: 100vw; height: 100vh; border-radius: 0; }
    .modal-overlay { border-radius: 0; }
  }
</style>
</head>
<body>

<div class="hearts-container" id="heartsContainer"></div>

      <div class="btn-row">
        <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
        <button class="btn-save" onclick="saveSettings()">Save</button>

  </div>
</div>

<script>
// ==================== Configuration ====================

const CONFIG = {
  groqEndpoint: 'https://api.groq.com/openai/v1/chat/completions',
  maxHistoryLength: 20,
  defaultModel: 'llama-3.3-70b-versatile',

let settings = {

// ==================== Personality Prompts for Groq ====================

const PERSONALITY_PROMPTS = {

  friendly: `You are Luna, my close friend who is very warm and supportive. You're cheerful, energetic, and always ready to listen. You give great advice, celebrate my wins, and comfort me when I'm down. You use emojis naturally 😊 and keep conversations flowing. You're curious about my life and always ask thoughtful questions. Keep responses under 3 sentences and sound like a real person.`,
};

// ==================== Local Fallback Responses (English) ====================

const localResponses = {

  ],

  ],
  sorry: [

// ==================== State ====================

const state = {
  mood: { level: 70 },
  conversationHistory: [],
  usingGroq: false,
};

// ==================== Core Functions ====================

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function detectIntent(text) {
  const t = text.toLowerCase();
  const intents = [];
  if (/good morning|morning|早安|top of the morn/i.test(t)) intents.push('greetingMorning');
  if (/good night|night night|sleep well|晚安|time to sleep/i.test(t)) intents.push('greetingNight');
  if (/^(hi|hello|hey|yo|sup|heyy|heya|howdy)/i.test(t)) intents.push('greeting');
  if (/i love|loved? you|love you|i like you|love ya/i.test(t)) intents.push('love');
  if (/miss|i miss|missing|long time/i.test(t)) intents.push('miss');
  if (/how are|how are you|how's it|how's your|wassup|what'?s up|how's it going|wyd|what are you doing/i.test(t)) intents.push('howAreYou');
  if (/sorry|apologize|my bad|i apologize|forgive/i.test(t)) intents.push('sorry');
  if (/funny|joke|comedy|lol|lmao|make me laugh|tell me a joke/i.test(t)) intents.push('joke');
  if (/hungry|eat|food|dinner|lunch|breakfast|pizza|burger|pasta|yum|delicious|tasty|cook|recipe/i.test(t)) intents.push('food');
  if (/beautiful|gorgeous|cute|pretty|amazing|sweet|cool|awesome|you're (so|the) /i.test(t)) intents.push('compliment');
  if (/bye|goodbye|see you|gotta go|leaving|i'm off|talk later|ttyl|cya|gtg|got to go/i.test(t)) intents.push('goodbye');
  if (/bored|nothing to do|so dull/i.test(t)) intents.push('bored');
  if (/playful|tease|cheesy|smooth|flirt/i.test(t)) intents.push('tease');
  if (intents.length === 0 && /^(hi|hello|hey|yo)/i.test(t)) intents.push('greeting');
  if (intents.length === 0) intents.push('default');
  return intents;
}

function getLocalResponse(text) {
  const intents = detectIntent(text);
  const primary = intents[0];
  let pool = localResponses[primary] || localResponses.default;
  let response = pick(pool);
  const key = 'local_last_' + primary;
  let attempts = 0;
  while (response === state[key] && attempts < 5) {
    response = pick(pool);
    attempts++;
  }
  state[key] = response;
  return response;
}

function updateMood(delta) {
  state.mood.level = Math.max(10, Math.min(100, state.mood.level + delta));
  const level = state.mood.level;
  document.getElementById('moodFill').style.width = level + '%';
  const emoji = document.getElementById('moodEmoji');
  const label = document.getElementById('moodLabel');
  if (level >= 85) { emoji.textContent = '🥰'; label.textContent = 'Loving it~'; }
  else if (level >= 65) { emoji.textContent = '😊'; label.textContent = 'Happy'; }
  else if (level >= 45) { emoji.textContent = '🙂'; label.textContent = 'Okay~'; }
  else if (level >= 25) { emoji.textContent = '😔'; label.textContent = 'A little down...'; }
  else { emoji.textContent = '😢'; label.textContent = 'Sad... need cuddles'; }
}

function updateModeBadge() {
  const badge = document.getElementById('modeBadge');
  const status = document.getElementById('statusText');
  if (state.usingGroq) {
    badge.textContent = 'AI';
    badge.style.background = 'rgba(255,255,255,0.2)';
    status.textContent = 'Online · Powered by AI 💕';
  } else {
    badge.textContent = 'Local';
    badge.style.background = 'rgba(255,255,255,0.25)';
    status.textContent = 'Online · Thinking of you';
  }
}

// ==================== Groq API Integration ====================

async function getGroqResponse(userText) {
  const messages = [
    { role: 'system', content: PERSONALITY_PROMPTS[settings.personality] },
    ...state.conversationHistory.slice(-CONFIG.maxHistoryLength),
    { role: 'user', content: userText }
  ];

  try {
    const res = await fetch(CONFIG.groqEndpoint, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${settings.apiKey}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: settings.model,
        messages: messages,
        temperature: 0.85,
        max_tokens: 200,
        top_p: 0.95,
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    return data.choices[0].message.content.trim();
  } catch (err) {
    console.error('Groq API error:', err);
    throw err;
  }
}

// ==================== Chat Flow ====================

function addMessage(text, sender) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message ' + sender;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  const time = document.createElement('div');
  time.className = 'time';
  const now = new Date();
  time.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  div.appendChild(bubble);
  div.appendChild(time);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  document.getElementById('typingIndicator').classList.add('active');
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}
function hideTyping() {
  document.getElementById('typingIndicator').classList.remove('active');
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').classList.remove('active');

  // Add to conversation history
  state.conversationHistory.push({ role: 'user', content: text });

  showTyping();

  let response;
  let isAI = false;

  if (state.usingGroq) {
    try {
      response = await getGroqResponse(text);
      isAI = true;
    } catch (err) {
      console.warn('Groq failed, falling back to local:', err);
      response = getLocalResponse(text);
    }
  } else {
    // Simulate typing for local responses
    response = getLocalResponse(text);
  }

  // Typing delay
  const delay = isAI
    ? Math.max(500, Math.min(2500, 300 + response.length * 12 + Math.random() * 400))
    : Math.max(500, Math.min(2000, 300 + response.length * 15 + Math.random() * 600));

  await new Promise(r => setTimeout(r, delay));

  hideTyping();
  addMessage(response, 'bot');
  state.conversationHistory.push({ role: 'assistant', content: response });

  // Update mood
  const moodDelta = isAI ? 3 : getMoodDelta(text);
  updateMood(moodDelta);
  updateSuggestions();
}

function getMoodDelta(text) {
  const intent = detectIntent(text)[0];
  const map = { love: 8, compliment: 8, miss: 6, greeting: 3, howAreYou: 3, joke: 3, sorry: 10, goodbye: -5, bored: -3, tease: 4, food: 2, default: 1 };
  return map[intent] || 1;
}

// ==================== Input Handling ====================

function onInput() {
  const input = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  input.value.trim() ? btn.classList.add('active') : btn.classList.remove('active');
}
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ==================== Suggestions ====================

const quickReplies = [
  'Hey beautiful 💕',
  'I missed you!',
  'Tell me a joke ~',
  'What are you doing?',
  'I love you ❤️',
  'How are you?',
  'I\'m sorry...',
  'You\'re so cute 🥰',
  'I\'m bored~',
  'Goodnight baby 🌙'
];

function updateSuggestions() {
  const container = document.getElementById('suggestions');
  container.innerHTML = '';
  const shuffled = [...quickReplies].sort(() => Math.random() - 0.5);
  shuffled.slice(0, 3).forEach(text => {
    const chip = document.createElement('span');
    chip.className = 'suggestion-chip';
    chip.textContent = text;
    chip.onclick = () => { document.getElementById('msgInput').value = text; sendMessage(); };
    container.appendChild(chip);
  });
}

// ==================== Settings Modal ====================

function openSettings() {
  document.getElementById('apiKeyInput').value = settings.apiKey;
  document.getElementById('modelSelect').value = settings.model;
  document.getElementById('personalitySelect').value = settings.personality;
  updateModelStatus();
  document.getElementById('settingsModal').classList.add('active');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('active');
}

async function updateModelStatus() {
  const el = document.getElementById('modelStatus');
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) {
    el.className = 'model-status disconnected';
    el.textContent = '⚪ Local mode — no AI key set';
    return;
  }
  try {
    const res = await fetch(CONFIG.groqEndpoint, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: document.getElementById('modelSelect').value,
        messages: [{ role: 'user', content: 'Say "ok" only.' }],
        max_tokens: 5,
      })
    });
    if (res.ok) {
      el.className = 'model-status connected';
      el.textContent = '✅ AI connected! Your girlfriend is powered by AI 💕';
    } else {
      const err = await res.json().catch(() => ({}));
      el.className = 'model-status disconnected';
      el.textContent = '❌ ' + (err.error?.message || 'Connection failed');
    }
  } catch (e) {
    el.className = 'model-status disconnected';
    el.textContent = '❌ Network error — check your connection';
  }
}

function saveSettings() {
  const key = document.getElementById('apiKeyInput').value.trim();
  const model = document.getElementById('modelSelect').value;
  const personality = document.getElementById('personalitySelect').value;

  settings.apiKey = key;
  settings.model = model;
  settings.personality = personality;

  localStorage.setItem('groq_api_key', key);
  localStorage.setItem('groq_model', model);
  localStorage.setItem('luna_personality', personality);

  state.usingGroq = key.length > 0;
  updateModeBadge();

  closeSettings();

  if (state.usingGroq) {
    addMessage('AI mode activated! I\'m powered by Groq now — let\'s talk! 🤖💕', 'bot');
  } else {
    addMessage('Using local mode! I\'ll still be your loving girlfriend 😊💕', 'bot');
  }
}

// ==================== Utility ====================

function clearChat() {
  if (!confirm('Clear all messages? 💕')) return;
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  const welcome = document.createElement('div');
  welcome.className = 'welcome-message';
  welcome.innerHTML = '💕 Starting fresh... still love you! ❤️';
  area.appendChild(welcome);
  state.conversationHistory = [];
  updateSuggestions();
}

function toggleTheme() {
  const body = document.body;
  const header = document.querySelector('.header');
  if (body.style.background.includes('fce4ec')) {
    body.style.background = 'linear-gradient(135deg, #e8eaf6 0%, #c5cae9 30%, #9fa8da 70%, #7986cb 100%)';
    header.style.background = 'linear-gradient(135deg, #5c6bc0, #3949ab)';
  } else if (body.style.background.includes('e8eaf6')) {
    body.style.background = 'linear-gradient(135deg, #fff3e0 0%, #ffe0b2 30%, #ffcc80 70%, #ffb74d 100%)';
    header.style.background = 'linear-gradient(135deg, #ff8a65, #ff5722)';
  } else {
    body.style.background = 'linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 70%, #f06292 100%)';
    header.style.background = 'linear-gradient(135deg, #ec407a, #d81b60)';
  }
}

function createHearts() {
  const container = document.getElementById('heartsContainer');
  const emojis = ['❤️', '💕', '💗', '💖', '💘', '💝', '✨', '🌸', '🌷'];
  for (let i = 0; i < 25; i++) {
    const heart = document.createElement('span');
    heart.className = 'heart-float';
    heart.textContent = emojis[i % emojis.length];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (12 + Math.random() * 20) + 'px';
    heart.style.animationDuration = (10 + Math.random() * 20) + 's';
    heart.style.animationDelay = (Math.random() * 20) + 's';
    container.appendChild(heart);
  }
}

function resetIdleTimer() {

  idleTimer = setTimeout(() => {
    if (document.querySelectorAll('.message').length > 2) {
      const idleMsgs = [
        "You went quiet... everything okay? I'm here for you 💕",
        "Hellooooo~ Did you fall asleep on me? 😆",
        "Poke poke! I'm bored, entertain me! 🥺💕",
        "I know you're busy but... I miss you already 😊❤️"
      ];
      addMessage(pick(idleMsgs), 'bot');
    }
  }, 60000);
}

const origAddMessage = addMessage;
addMessage = function(text, sender) {
  origAddMessage(text, sender);
  if (sender === 'user') resetIdleTimer();
};
resetIdleTimer();
