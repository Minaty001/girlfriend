<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 我的女友 AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 70%, #f06292 100%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Floating hearts background */
  .hearts-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .heart-float {
    position: absolute;
    font-size: 20px;
    opacity: 0.15;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0.15; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  .app-container {
    position: relative;
    z-index: 1;
    width: 420px;
    height: 700px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    box-shadow: 0 25px 60px rgba(233,30,99,0.25), 0 0 0 1px rgba(255,255,255,0.5) inset;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #ec407a, #d81b60);
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fce4ec, #f48fb1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    flex-shrink: 0;
    position: relative;
  }

  .avatar .status-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    background: #69f0ae;
    border: 2px solid white;
    border-radius: 50%;
  }

  .header-info {
    flex: 1;
    min-width: 0;
  }

  .header-info h2 {
    color: white;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .header-info .status-text {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    font-weight: 400;
    margin-top: 2px;
  }

  .header-actions {
    display: flex;
    gap: 6px;
  }

  .header-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-btn:hover {
    background: rgba(255,255,255,0.35);
  }

  /* Mood bar */
  .mood-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: rgba(236,64,122,0.08);
    border-bottom: 1px solid rgba(233,30,99,0.08);
    flex-shrink: 0;
  }

  .mood-label {
    font-size: 12px;
    color: #ad1457;
    font-weight: 600;
  }

  .mood-meter {
    flex: 1;
    height: 4px;
    background: rgba(233,30,99,0.12);
    border-radius: 4px;
    overflow: hidden;
  }

  .mood-fill {
    height: 100%;
    background: linear-gradient(90deg, #f06292, #ec407a, #d81b60);
    border-radius: 4px;
    transition: width 0.5s ease;
    width: 70%;
  }

  .mood-emoji {
    font-size: 16px;
  }

  /* Messages */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar {
    width: 4px;
  }

  .chat-area::-webkit-scrollbar-track {
    background: transparent;
  }

  .chat-area::-webkit-scrollbar-thumb {
    background: rgba(233,30,99,0.2);
    border-radius: 4px;
  }

  .message {
    max-width: 80%;
    animation: msgIn 0.35s ease;
    display: flex;
    flex-direction: column;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message.user {
    align-self: flex-end;
    align-items: flex-end;
  }

  .message.bot {
    align-self: flex-start;
  }

  .bubble {
    padding: 12px 18px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }

  .message.user .bubble {
    background: linear-gradient(135deg, #ec407a, #d81b60);
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(233,30,99,0.2);
  }

  .message.bot .bubble {
    background: white;
    color: #3e2723;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid rgba(233,30,99,0.08);
  }

  .message .time {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
    padding: 0 6px;
  }

  /* Typing indicator */
  .typing-indicator {
    align-self: flex-start;
    display: none;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }

  .typing-indicator.active {
    display: flex;
  }

  .typing-indicator .bubble {
    background: white;
    padding: 14px 20px;
    border-radius: 20px;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(233,30,99,0.08);
    display: flex;
    gap: 4px;
  }

  .typing-indicator .bubble span {
    width: 8px;
    height: 8px;
    background: #ec407a;
    border-radius: 50%;
    display: inline-block;
    animation: typingDot 1.4s infinite ease-in-out;
  }

  .typing-indicator .bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  .typing-indicator .typing-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fce4ec, #f48fb1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  /* Input area */
  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid rgba(233,30,99,0.08);
    flex-shrink: 0;
    background: rgba(255,255,255,0.5);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .input-wrapper {
    flex: 1;
    background: white;
    border-radius: 24px;
    border: 2px solid rgba(233,30,99,0.12);
    display: flex;
    align-items: flex-end;
    transition: 0.2s;
    padding: 4px 4px 4px 18px;
  }

  .input-wrapper:focus-within {
    border-color: #ec407a;
    box-shadow: 0 0 0 4px rgba(236,64,122,0.1);
  }

  .input-wrapper textarea {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    padding: 8px 0;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    background: transparent;
    color: #3e2723;
  }

  .input-wrapper textarea::placeholder {
    color: #bbb;
  }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #ec407a, #d81b60);
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0.6;
    pointer-events: none;
  }

  .send-btn.active {
    opacity: 1;
    pointer-events: auto;
  }

  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 15px rgba(233,30,99,0.35);
  }

  .send-btn:active {
    transform: scale(0.95);
  }

  /* Quick reply suggestions */
  .suggestions {
    display: flex;
    gap: 8px;
    padding: 12px 20px 0;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .suggestion-chip {
    padding: 6px 14px;
    border-radius: 16px;
    border: 1px solid rgba(233,30,99,0.2);
    background: rgba(255,255,255,0.7);
    color: #ad1457;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
  }

  .suggestion-chip:hover {
    background: #ec407a;
    color: white;
    border-color: #ec407a;
  }

  /* Welcome message animation */
  .welcome-message {
    text-align: center;
    padding: 20px 0 10px;
    color: #ad1457;
    font-size: 14px;
    animation: fadeInUp 0.6s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .app-container {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
    }
  }
</style>
</head>
<body>

<div class="hearts-container" id="heartsContainer"></div>

</div>

}

function detectIntent(text) {
  const t = text.toLowerCase();
  const intents = [];

  if (/早[上安安]|good morning|早安|morning/i.test(t)) intents.push('greetingMorning');
  if (/晚[上安安好]|晚安|good night|night|熬夜|还不睡/i.test(t)) intents.push('greetingNight', 'sleepy');
  if (/^(嗨|hi|hello|hey|你好|嗨咯|hi~|hello~|你好呀|在吗|在不在|嗨喽)/i.test(t)) intents.push('greeting');
  if (/^(你好|hi|hello|hey|嗨|在吗)/i.test(t)) intents.push('greeting');
  if (/爱你|我爱|喜欢[你我]|最爱你|love you|i love|forever/i.test(t)) intents.push('love');
  if (/想[你我]|miss|想你|想你了|想念/i.test(t)) intents.push('miss');
  if (/[你咋]样|how are|心情|开心吗|在干嘛|干嘛呢|忙什么呢/i.test(t)) intents.push('howAreYou');
  if (/对不起|抱歉|sorry|错了|原谅|道歉|是我的错/i.test(t)) intents.push('sorry');
  if (/生气|哼|讨厌|坏蛋|坏坏|不理|气死|不高兴/i.test(t)) intents.push('angry');
  if (/吃[饭了吗]?|好吃|饿|美食|饭|火锅|蛋糕|零食|水果|奶茶/i.test(t)) intents.push('food');
  if (/好[好看看美漂亮帅可爱喜欢]|漂亮|可爱|美[女丽]|帅气|迷人|魅力/i.test(t)) intents.push('compliment');
  if (/拜拜|bye|再见|走了|[去上]班|[去上]学|回头聊|晚点聊|先忙|下次聊|晚安/i.test(t)) {
    if (!/晚[上安安好]|晚安/.test(t)) intents.push('goodbye');
  }
  if (/笑话|搞笑|笑死|哈哈|haha|lol|讲一个|逗我/i.test(t)) intents.push('joke');
  if (/天气|下雨|下雪|台风|热[死]?|冷|温度/i.test(t)) intents.push('weather');
  if (/人生|意义|未来|永远|一辈子|一直|世界|生命|命运|缘分/i.test(t)) intents.push('deep');
  if (/肉麻|油[腻嘴]|你[好坏]|坏蛋|流氓|讨厌|害羞|捂脸/i.test(t)) intents.push('tease');
  if (/困[了]?|睡[觉]?|累了|眼皮|打哈欠|哈欠|zzz|想睡/i.test(t)) intents.push('sleepy');
  if (/嗯|哦|喔|好的|好吧|ok|okay|知道|明白|呵呵|行吧/i.test(t)) intents.push('default');
  
  // Greeting without specific time
  if (intents.length === 0 && /(hi|hello|hey|嗨|你好|嗨咯|hi~)/i.test(t)) intents.push('greeting');
  
  if (intents.length === 0) intents.push('default');
  
  return intents;
}

function getResponse(text) {
  const intents = detectIntent(text);
  const primary = intents[0];
  
  // Mood effect - pick based on current mood
  let pool = girl.responses[primary] || girl.responses.default;
  
  // Don't repeat recently used responses
  const recentKey = primary + '_last';
  let response = pick(pool);
  let attempts = 0;
  while (response === girl.memory[recentKey] && attempts < 5) {
    response = pick(pool);
    attempts++;
  }
  girl.memory[recentKey] = response;
  
  // Update mood based on conversation
  updateMood(text, primary);
  
  return response;
}

function updateMood(text, intent) {
  let delta = 0;
  if (['love', 'compliment', 'miss'].includes(intent)) delta = 8;
  else if (['greeting', 'howAreYou', 'joke'].includes(intent)) delta = 3;
  else if (['sorry'].includes(intent)) delta = 12;
  else if (['angry'].includes(intent)) delta = -10;
  else if (['goodbye'].includes(intent)) delta = -5;
  else if (['food', 'weather'].includes(intent)) delta = 2;
  else delta = 1;
  
  girl.mood.level = Math.max(10, Math.min(100, girl.mood.level + delta));
  updateMoodUI();
}

function updateMoodUI() {
  const level = girl.mood.level;
  const fill = document.getElementById('moodFill');
  const emoji = document.getElementById('moodEmoji');
  const label = document.getElementById('moodLabel');
  
  fill.style.width = level + '%';
  
  if (level >= 85) {
    emoji.textContent = '🥰';
    label.textContent = '超开心~';
  } else if (level >= 65) {
    emoji.textContent = '😊';
    label.textContent = '开心~';
  } else if (level >= 45) {
    emoji.textContent = '🙂';
    label.textContent = '还行吧~';
  } else if (level >= 25) {
    emoji.textContent = '😔';
    label.textContent = '有点不开心...';
  } else {
    emoji.textContent = '😢';
    label.textContent = '伤心...需要安慰';
  }
}

// ==================== Chat UI ====================

function formatTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function addMessage(text, sender) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message ' + sender;
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  
  const time = document.createElement('div');
  time.className = 'time';
  time.textContent = formatTime();
  
  div.appendChild(bubble);
  div.appendChild(time);
  area.appendChild(div);
  
  // Scroll to bottom
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  document.getElementById('typingIndicator').classList.add('active');
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator').classList.remove('active');
}

function simulateResponse(userText) {
  showTyping();
  
  // Simulate typing delay (500ms - 2000ms based on response length)
  const response = getResponse(userText);
  const delay = Math.max(600, Math.min(2000, 400 + response.length * 15 + Math.random() * 600));
  
  setTimeout(() => {
    hideTyping();
    addMessage(response, 'bot');
    updateSuggestions();
    
    // Auto reply if user says bye
    if (/拜拜|bye|再见|走了/.test(userText.toLowerCase()) && Math.random() > 0.3) {
      setTimeout(() => {
        const followUps = [
          "要记得想我哦！💕",
          "忙完了早点回来~ 我等你 ❤️",
          "路上小心，爱你哦！😊💕"
        ];
        addMessage(pick(followUps), 'bot');
      }, 800 + Math.random() * 1000);
    }
  }, delay);
}

// ==================== Input Handling ====================

function onInput() {
  const input = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  
  // Auto-resize
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  
  // Enable/disable send
  if (input.value.trim()) {
    btn.classList.add('active');
  } else {
    btn.classList.remove('active');
  }
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  
  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').classList.remove('active');
  
  simulateResponse(text);
}

// ==================== Suggestions ====================

const quickReplies = [
  '宝贝在干嘛呀？',
  '今天好想你~',
  '我爱你 ❤️',
  '讲个笑话嘛~',
  '在忙什么呢？',
  '你心情好吗？',
  '我错了好不好...',
  '抱抱 🥰'
];

function updateSuggestions() {
  const container = document.getElementById('suggestions');
  container.innerHTML = '';
  
  // Pick 3 random suggestions
  const shuffled = [...quickReplies].sort(() => Math.random() - 0.5);
  shuffled.slice(0, 3).forEach(text => {
    const chip = document.createElement('span');
    chip.className = 'suggestion-chip';
    chip.textContent = text;
    chip.onclick = () => {
      document.getElementById('msgInput').value = text;
      sendMessage();
    };
    container.appendChild(chip);
  });
}

// ==================== Utility ====================

function clearChat() {
  if (!confirm('确定要清空聊天记录吗？😢')) return;
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  const welcome = document.createElement('div');
  welcome.className = 'welcome-message';
  welcome.innerHTML = '💕 重新开始啦~ 还是最爱你 ❤️';
  area.appendChild(welcome);
  updateSuggestions();
}

function toggleTheme() {
  // Light toggle - swap gradient direction
  const app = document.querySelector('.app-container');
  const current = app.style.backdropFilter;
  app.style.transition = '0.3s';
  
  // Simple theme toggle: just change background slightly
  const body = document.body;
  if (body.style.background.includes('fce4ec')) {
    body.style.background = 'linear-gradient(135deg, #e8eaf6 0%, #c5cae9 30%, #9fa8da 70%, #7986cb 100%)';
    document.querySelector('.header').style.background = 'linear-gradient(135deg, #5c6bc0, #3949ab)';
  } else if (body.style.background.includes('e8eaf6')) {
    body.style.background = 'linear-gradient(135deg, #fff3e0 0%, #ffe0b2 30%, #ffcc80 70%, #ffb74d 100%)';
    document.querySelector('.header').style.background = 'linear-gradient(135deg, #ff8a65, #ff5722)';
  } else {
    body.style.background = 'linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 70%, #f06292 100%)';
    document.querySelector('.header').style.background = 'linear-gradient(135deg, #ec407a, #d81b60)';
  }
}

// ==================== Floating Hearts ====================

function createHearts() {
  const container = document.getElementById('heartsContainer');
  const emojis = ['❤️', '💕', '💗', '💖', '💘', '💝', '✨', '🌸', '🌷'];
  for (let i = 0; i < 25; i++) {
    const heart = document.createElement('span');
    heart.className = 'heart-float';
    heart.textContent = emojis[i % emojis.length];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (12 + Math.random() * 20) + 'px';
    heart.style.animationDuration = (10 + Math.random() * 20) + 's';
    heart.style.animationDelay = (Math.random() * 20) + 's';
    container.appendChild(heart);
  }
}

function resetIdleTimer() {

  idleTimer = setTimeout(() => {
    if (document.querySelectorAll('.message').length > 2) {
      const idleMsgs = [
        "宝宝怎么不说话啦...是不是在忙？😊 那我等你~",

        "在干嘛呢~ 我有点无聊，陪我说说话嘛 🥺"
      ];
      addMessage(pick(idleMsgs), 'bot');
    }
  }, 60000); // 1 minute idle
}

// Override addMessage to track user activity

addMessage = function(text, sender) {
  origAddMessage(text, sender);
  if (sender === 'user') resetIdleTimer();
};
