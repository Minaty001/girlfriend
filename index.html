<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小薇 (Xiao Wei) — Your Sweet AI Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css?v=2.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            cream: {
              50: '#FAF8F5',
              100: '#FDFBF7',
              200: '#F5EFEB',
              300: '#EAE1DA',
            },
            pastelPink: {
              50: '#FFF0F3',
              100: '#FFE3E8',
              200: '#FFCCD5',
              300: '#FFA4B4',
              400: '#FF758F',
              500: '#FF4D6D',
            },
            plum: {
              50: '#FAF5FA',
              900: '#1A0E2E',
              950: '#0F051D',
              800: '#2A174A',
              700: '#3D256D',
              600: '#54368C',
              500: '#7554AF',
            },
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
</head>
<body class="transition-colors duration-500">

  <!-- Ambient background blobs for rich aesthetics -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-pastelPink-100/40 dark:bg-plum-900/30 blur-3xl ambient-blob-1"></div>
    <div class="absolute top-1/2 -right-40 w-96 h-96 rounded-full bg-pastelPink-50/50 dark:bg-indigo-900/20 blur-3xl ambient-blob-2"></div>
    <div class="absolute -bottom-40 left-1/3 w-96 h-96 rounded-full bg-cream-200/40 dark:bg-purple-950/20 blur-3xl ambient-blob-3"></div>
  </div>

  <!-- React Mount Point -->
  <div id="root" class="relative z-10 w-full h-full flex items-center justify-center bg-cream-50 dark:bg-plum-950 transition-colors duration-500">
    <div class="flex flex-col items-center gap-3">
      <div class="w-10 h-10 rounded-full border-4 border-pastelPink-200 border-t-pastelPink-500 animate-spin"></div>
      <p class="text-xs text-pastelPink-400 dark:text-purple-300 font-semibold tracking-wider">Loading companion interface...</p>
    </div>
  </div>

  <!-- React & ReactDOM (UMD Production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone for client-side compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Load script as Babel JSX -->
  <script src="script.js?v=2.0" type="text/babel"></script>
</body>
</html>
