# ────────────────────────────────────────────────────────────────
# Luna v3 — Docker Compose
# ────────────────────────────────────────────────────────────────

services:
  luna-bot:
    build: .
    container_name: luna-bot
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      # Mount for live reload during development
      - ./brain.py:/app/brain.py
      - ./app.py:/app/app.py
      - ./style.css:/app/style.css
      - ./script.js:/app/script.js
      - ./index.html:/app/index.html
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
